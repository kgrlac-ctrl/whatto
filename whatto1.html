<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whatto</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f7f5;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;font-family:'DM Sans',sans-serif}
#app{width:100%;max-width:440px}
h1{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:4px;color:#111;line-height:1}
.sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#aaa;margin-bottom:1.5rem}
.tabs{display:flex;gap:8px;margin-bottom:1.3rem;flex-wrap:wrap}
.tab{padding:7px 18px;border-radius:20px;border:1.5px solid #ddd;background:#fff;color:#888;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab.on{background:#e63946;border-color:#e63946;color:#fff}
.tab:hover:not(.on){border-color:#bbb;color:#444}
#btn{width:100%;padding:1.1rem;background:#e63946;border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:4px;cursor:pointer;margin-bottom:1.2rem;transition:opacity .2s,transform .1s}
#btn:active{transform:scale(0.98)}
#btn:disabled{opacity:.5;cursor:not-allowed}
#load{text-align:center;padding:2rem;display:none}
.spin{width:32px;height:32px;border:2px solid #eee;border-top-color:#e63946;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
#load p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#bbb}
#card{border-radius:16px;border:1.5px solid #e8e8e8;overflow:hidden;display:none;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.06)}

/* Cover s play gumbom */
.cover-wrap{position:relative;cursor:pointer}
.cover-wrap img{width:100%;max-height:340px;object-fit:cover;object-position:top;display:block}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.15);transition:background .2s}
.cover-wrap:hover .play-overlay{background:rgba(0,0,0,0.35)}
.play-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:24px;padding-left:4px;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:transform .15s}
.cover-wrap:hover .play-circle{transform:scale(1.1)}
.no-trailer .play-overlay{display:none}

.info{padding:1.1rem 1.3rem 1.5rem}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;letter-spacing:2px;text-transform:uppercase;background:#f5f5f5;color:#888;margin-bottom:10px}
.title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;line-height:1.1;color:#111;margin-bottom:6px}
.meta{font-size:12px;color:#bbb;margin-bottom:10px}
.genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.genre{padding:3px 10px;border-radius:20px;border:1px solid #eee;font-size:11px;color:#999}
.rating{font-size:14px;color:#f5a623;font-weight:500;margin-bottom:10px}
.overview{font-size:13px;color:#555;line-height:1.7}

/* Fullscreen overlay */
#trailer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
#trailer-overlay.open{display:flex}
#trailer-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#trailer-close:hover{background:rgba(255,255,255,0.3)}
#trailer-frame{width:100%;max-width:640px;aspect-ratio:16/9;border:none;border-radius:8px}
#trailer-title{color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;margin-top:16px;text-align:center;padding:0 1rem}

#err{padding:1rem;text-align:center;color:#c0392b;font-size:13px;display:none;background:#fdf0f0;border-radius:10px;margin-bottom:1rem}
#more{width:100%;margin-top:.8rem;padding:.8rem;background:#fff;border:1.5px solid #eee;border-radius:10px;color:#999;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;display:none}
#more:hover{border-color:#ccc;color:#444}
</style>
</head>
<body>

<!-- Fullscreen trailer overlay -->
<div id="trailer-overlay">
  <button id="trailer-close">✕</button>
  <iframe id="trailer-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  <div id="trailer-title"></div>
</div>

<div id="app">
  <h1>WHATTO</h1>
  <p class="sub">Random generator</p>
  <div class="tabs">
    <button class="tab on" data-t="movie">Film</button>
    <button class="tab" data-t="tv">TV Show</button>
    <button class="tab" data-t="all">Sve</button>
  </div>
  <button id="btn">RANDOM</button>
  <div id="err"></div>
  <div id="load"><div class="spin"></div><p>tražim nešto...</p></div>
  <div id="card">
    <div class="cover-wrap" id="cover-wrap">
      <img id="poster" src="" alt="">
      <div class="play-overlay">
        <div class="play-circle">▶</div>
      </div>
    </div>
    <div class="info">
      <div class="badge" id="badge"></div>
      <div class="title" id="title"></div>
      <div class="meta" id="meta"></div>
      <div class="genres" id="genres"></div>
      <div class="rating" id="rating"></div>
      <div class="overview" id="overview"></div>
    </div>
  </div>
  <button id="more">još jedan ↺</button>
</div>

<script>
const TMDB='eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIyNmZjYTEzMzM5ZTRmM2Y4ZmZhMzNlODEwMDQzYWY5NyIsIm5iZiI6MTc1NjgxMzYwOS45MjQsInN1YiI6IjY4YjZkOTI5ODRkNjU5NmMyMjFmMmIzZiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.3JJVrlIFT8kum-sZSbjXjf39SO5-9zP2hzV-NPQDlZY';
const gMap={28:'Akcija',18:'Drama',35:'Komedija',27:'Horor',878:'Sci-Fi',10749:'Romansa',12:'Avantura',16:'Animacija',80:'Kriminal',99:'Dokumentarac',14:'Fantazija',53:'Triler',37:'Western',9648:'Misterija',10751:'Obiteljski',10765:'Sci-Fi/Fantazija',10759:'Akcija/Avantura'};
let curType='movie';
let curTrailerId=null;
let curTitle='';

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

async function tmdb(path){
  const r=await fetch('https://api.themoviedb.org/3'+path,{headers:{Authorization:'Bearer '+TMDB}});
  if(!r.ok) throw new Error('TMDB greška '+r.status);
  return r.json();
}

async function getTrailer(id, type){
  try{
    const d=await tmdb(`/${type}/${id}/videos?language=en-US`);
    const trailers=d.results?.filter(v=>v.site==='YouTube'&&(v.type==='Trailer'||v.type==='Teaser'));
    if(trailers?.length) return trailers[0].key;
  }catch(e){}
  return null;
}

async function fetchMovie(){
  const page=ri(1,400);
  const d=await tmdb(`/discover/movie?page=${page}&sort_by=vote_count.asc&vote_count.gte=10&language=en-US`);
  if(!d.results?.length) throw new Error('Nema rezultata');
  const it=d.results[ri(0,d.results.length-1)];
  const trailerId=await getTrailer(it.id,'movie');
  return{type:'movie',id:it.id,title:it.title,year:(it.release_date||'').slice(0,4),overview:it.overview,poster:it.poster_path?`https://image.tmdb.org/t/p/w500${it.poster_path}`:'',rating:it.vote_average?(+it.vote_average).toFixed(1):'',genres:(it.genre_ids||[]).map(id=>gMap[id]).filter(Boolean).slice(0,4),trailerId};
}

async function fetchTV(){
  const page=ri(1,400);
  const d=await tmdb(`/discover/tv?page=${page}&sort_by=vote_count.asc&vote_count.gte=5&language=en-US`);
  if(!d.results?.length) throw new Error('Nema rezultata');
  const it=d.results[ri(0,d.results.length-1)];
  const trailerId=await getTrailer(it.id,'tv');
  return{type:'tv',id:it.id,title:it.name,year:(it.first_air_date||'').slice(0,4),overview:it.overview,poster:it.poster_path?`https://image.tmdb.org/t/p/w500${it.poster_path}`:'',rating:it.vote_average?(+it.vote_average).toFixed(1):'',genres:(it.genre_ids||[]).map(id=>gMap[id]).filter(Boolean).slice(0,4),trailerId};
}

async function getItem(){
  const pick=curType==='all'?['movie','tv'][ri(0,1)]:curType;
  if(pick==='movie') return fetchMovie();
  return fetchTV();
}

function openTrailer(){
  if(!curTrailerId) return;
  const overlay=document.getElementById('trailer-overlay');
  const frame=document.getElementById('trailer-frame');
  const ttitle=document.getElementById('trailer-title');
  frame.src=`https://www.youtube.com/embed/${curTrailerId}?autoplay=1&rel=0`;
  ttitle.textContent=curTitle;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

function closeTrailer(){
  const overlay=document.getElementById('trailer-overlay');
  const frame=document.getElementById('trailer-frame');
  frame.src='';
  overlay.classList.remove('open');
  document.body.style.overflow='';
}

function show(it){
  curTrailerId=it.trailerId||null;
  curTitle=it.title;

  document.getElementById('card').style.display='block';
  document.getElementById('more').style.display='block';
  document.getElementById('err').style.display='none';

  document.getElementById('badge').textContent=it.type==='movie'?'Film':'TV Show';
  document.getElementById('title').textContent=it.title||'—';
  document.getElementById('meta').innerHTML=it.year||'';
  document.getElementById('rating').innerHTML=it.rating?`★ ${it.rating}`:'';
  document.getElementById('genres').innerHTML=(it.genres||[]).map(g=>`<span class="genre">${g}</span>`).join('');
  document.getElementById('overview').textContent=it.overview||'';

  const poster=document.getElementById('poster');
  const coverWrap=document.getElementById('cover-wrap');

  if(it.poster){poster.src=it.poster;}

  // Ako nema trailera, sakrij play gumb
  if(it.trailerId){
    coverWrap.classList.remove('no-trailer');
    coverWrap.style.cursor='pointer';
  } else {
    coverWrap.classList.add('no-trailer');
    coverWrap.style.cursor='default';
  }
}

async function doRandom(){
  closeTrailer();
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('load').style.display='block';
  document.getElementById('card').style.display='none';
  document.getElementById('more').style.display='none';
  document.getElementById('err').style.display='none';
  try{show(await getItem());}
  catch(e){
    const el=document.getElementById('err');
    el.textContent='Greška: '+e.message;
    el.style.display='block';
  }finally{
    btn.disabled=false;
    document.getElementById('load').style.display='none';
  }
}

document.getElementById('btn').addEventListener('click',doRandom);
document.getElementById('more').addEventListener('click',doRandom);
document.getElementById('cover-wrap').addEventListener('click',openTrailer);
document.getElementById('trailer-close').addEventListener('click',closeTrailer);
document.getElementById('trailer-overlay').addEventListener('click',function(e){
  if(e.target===this) closeTrailer();
});
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeTrailer();});

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    curType=t.dataset.t;
  });
});
</script>
</body>
</html>
